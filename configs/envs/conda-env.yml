name: automation-central
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
      # ADO / Azure
      - azure-devops==7.1.0b4
      - azure-identity>=1.15.0
      - msal>=1.26.0
      # Office file generation
      - python-docx>=1.1.0
      - openpyxl>=3.1.2
      # HTTP / API
      - requests>=2.31.0
      - httpx>=0.26.0
      # Data / ML tooling
      - pandas>=2.1.0
      - pyyaml>=6.0.1
      - jinja2>=3.1.3
      # Utilities
      - python-dotenv>=1.0.0
      - rich>=13.7.0
      - typer>=0.9.0
